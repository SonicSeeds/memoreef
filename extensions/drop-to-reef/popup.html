<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Drop to Reef</title>
    <style>
      :root {
        color-scheme: light dark;
        --reef-bg: #071513;
        --reef-card: #10211e;
        --reef-ink: #edf7f2;
        --reef-muted: #a9beb6;
        --reef-accent: #75e6c8;
        --reef-warn: #ffcb7a;
      }

      body {
        width: 310px;
        margin: 0;
        padding: 14px;
        font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--reef-ink);
        background: radial-gradient(circle at 20% 0%, #16352f 0, var(--reef-bg) 48%);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 17px;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0 0 12px;
        color: var(--reef-muted);
      }

      label {
        display: block;
        margin: 0 0 6px;
        color: var(--reef-muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        margin: 0 0 10px;
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 10px;
        padding: 9px 10px;
        color: var(--reef-ink);
        background: rgba(255,255,255,0.07);
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 10px 12px;
        font-weight: 700;
        color: #06201a;
        background: var(--reef-accent);
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.68;
      }

      .status {
        min-height: 38px;
        margin-top: 12px;
        padding: 10px;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 12px;
        background: rgba(255,255,255,0.05);
        color: var(--reef-muted);
        white-space: pre-wrap;
      }

      .status[data-kind="success"] { color: var(--reef-accent); }
      .status[data-kind="error"] { color: var(--reef-warn); }
      code { color: var(--reef-accent); }
    </style>
  </head>
  <body>
    <h1>Drop to Reef</h1>
    <p>Save this page, including highlighted text, into your local MemoReef vault.</p>
    <label for="server-url">MemoReef server URL</label>
    <input id="server-url" type="url" value="http://127.0.0.1:8765" spellcheck="false">
    <button id="drop-button" type="button">Drop current page</button>
    <div id="status" class="status">Use localhost when MemoReef runs on this computer, or the Mac Mini LAN/Tailscale URL when dropping from another device.</div>
    <script src="popup.js"></script>
  </body>
</html>
