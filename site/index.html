<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=https://memoreef.de/" />
  <title>MemoReef — Save sources. Let ideas surface.</title>
  <meta name="description" content="MemoReef transforms scattered bookmarks and research links into a living, agent-ready knowledge reef." />
  <link rel="canonical" href="https://memoreef.de/" />
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #02070b;
      color: #effffb;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 20%, rgba(20, 184, 166, .20), transparent 24rem),
        linear-gradient(180deg, #062532, #02070b 70%);
    }
    main {
      width: min(680px, calc(100% - 40px));
      padding: 40px;
      border: 1px solid rgba(140, 247, 232, .22);
      border-radius: 28px;
      background: rgba(2, 14, 19, .72);
      box-shadow: 0 34px 120px rgba(0,0,0,.36);
      text-align: center;
    }
    h1 { margin: 0 0 14px; font-size: clamp(36px, 8vw, 72px); line-height: .92; letter-spacing: -.06em; }
    p { margin: 0 auto 24px; max-width: 54ch; color: #b8d7d2; line-height: 1.6; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      background: #14b8a6;
      color: #021012;
      text-decoration: none;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>Save sources.<br />Let ideas surface.</h1>
    <p>The current MemoReef landing page lives at memoreef.de. This repo page redirects there so old local landing prototypes do not masquerade as the product.</p>
    <a href="https://memoreef.de/">Open memoreef.de</a>
  </main>
</body>
</html>
